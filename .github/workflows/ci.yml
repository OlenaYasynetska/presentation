# Проверка сборки на каждом push и на pull request.
# Деплой на Vercel — через Import репозитория в панели Vercel.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          # VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
